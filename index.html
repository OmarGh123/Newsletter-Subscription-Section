<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #eef1f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .card-box {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      width: 600px;
      height: 300px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      color: #aaa;
      cursor: pointer;
    }

    .title-small {
      font-size: 12px;
      color: #777;
      letter-spacing: 1px;
    }

    .title-big {
      font-size: 28px;
      font-weight: bold;
      color: #ff4d2d;
    }

    .desc {
      color: #555;
      font-size: 14px;
      margin: 10px 0 20px;

    }

    .form-box {
      display: flex;
    }

    .form-box input {
      border: 1px solid #ddd;
      border-right: none;
      border-radius: 8px 0 0 8px;
      padding: 10px;
      width: 100%;
      height: 30px;
    }

    .form-box button {
      background: #ff4d2d;
      border: none;
      color: white;
      padding: 0 20px;
      border-radius: 0 8px 8px 0;
      font-weight: bold;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="card-box">

    <div class="close">×</div>

    <!-- row 1 -->
    <div class="row align-items-center mb-3">

      <div class="col-4 text-center">
        <img src="assets/images/Group 8 (1).png"
          style="max-width:200px;">
      </div>

      <div class="col-8" style=" padding: 0 60px;">
        <div class="title-small">GET OUR WEEKLY</div>
        <div class="title-big">NEWSLETTER</div>

        <div class="desc">
          Get weekly updates on the newest <br>
          design stories, case studies and <br>
          tips right in your mailbox. <br>
          <b>Subscribe now!</b>
        </div>
      </div>

    </div>

    <!-- row 2 -->
    <div class="form-box">
      <input type="text" placeholder="Email Address">
      <button>SUBSCRIBE</button>
    </div>

    <!-- row 3 -->
    <div class="note">
      Your email is safe with us, we don’t spam.
    </div>

  </div>

</body>

</html>
